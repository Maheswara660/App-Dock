name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 fakeroot rpm

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        if: runner.os != 'Windows'

      - name: Build Desktop (Linux)
        if: runner.os == 'Linux'
        run: ./gradlew :desktopApp:packageAppImage :desktopApp:packageDeb :desktopApp:packageRpm --no-daemon --stacktrace --info

      - name: Build Desktop (Windows)
        if: runner.os == 'Windows'
        run: ./gradlew :desktopApp:packageExe :desktopApp:packageMsi --no-daemon --stacktrace --info

      - name: Build Desktop (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew :desktopApp:packageDmg :desktopApp:packagePkg --no-daemon --stacktrace --info

      - name: Stop Gradle Daemon
        run: ./gradlew --stop
        if: always()

      - name: Upload Linux Artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: AppDock-Linux-${{ github.run_number }}
          path: |
            desktopApp/build/compose/binaries/main/appimage/*
            desktopApp/build/compose/binaries/main/deb/*
            desktopApp/build/compose/binaries/main/rpm/*
            
      - name: Upload Windows Artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: AppDock-Windows-${{ github.run_number }}
          path: |
            desktopApp/build/compose/binaries/main/exe/*
            desktopApp/build/compose/binaries/main/msi/*

      - name: Upload macOS Artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: AppDock-macOS-${{ github.run_number }}
          path: |
            desktopApp/build/compose/binaries/main/dmg/*
            desktopApp/build/compose/binaries/main/pkg/*

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            echo "$ANDROID_KEYSTORE" | base64 --decode > androidApp/release-keystore.jks
          fi

      - name: Build Android APK
        env:
          ANDROID_KEYSTORE_PATH: release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease --no-daemon --stacktrace --info

      - name: Stop Gradle Daemon
        run: ./gradlew --stop
        if: always()

      - name: Cleanup Keystore
        run: rm -f androidApp/release-keystore.jks
        if: always()

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AppDock-Android-Release-${{ github.run_number }}
          path: androidApp/build/outputs/apk/release/*.apk
